name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: verifica que el build de React/Vite compila ──────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: proyecto/package-lock.json

      - name: Instalar dependencias
        working-directory: proyecto
        run: npm ci

      - name: Build (Vite)
        working-directory: proyecto
        run: npm run build

  # ─── Backend: valida sintaxis Python y dependencias ─────────────────────────
  backend:
    name: Backend Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Verificar sintaxis Python
        run: |
          python -m py_compile backend/app.py
          python -m py_compile backend/routes/residentes.py
          python -m py_compile backend/routes/proyectos.py
          python -m py_compile backend/routes/asesores.py
          python -m py_compile backend/routes/empresas.py
          python -m py_compile backend/routes/carreras.py
          python -m py_compile backend/routes/backup.py
          echo "✅ Sintaxis Python OK"

      - name: Verificar imports (sin DB)
        run: |
          python -c "
          import sys, types

          # Mock database module para no requerir MySQL en CI
          db_mock = types.ModuleType('database')
          db_mock.get_connection = lambda: None
          sys.modules['database'] = db_mock

          from flask import Flask
          app = Flask(__name__)
          print('✅ Flask imports OK')
          "
