name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # Ejemplo: v1.0.0, v1.2.3

  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej: 1.0.1)'
        required: true
        type: string

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Obtener versión ─────────────────────────────────────────────────
      - name: Obtener versión
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      # ── 2. Build Frontend ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: proyecto/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: proyecto
        run: npm ci

      - name: Build Vite (producción)
        working-directory: proyecto
        run: npm run build
        # Genera: proyecto/dist/

      # ── 3. Build Backend (PyInstaller) ─────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python + PyInstaller
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Crear database.py de producción (placeholder CI)
        shell: bash
        run: |
          cp backend/database.example.py backend/database.py
          # En producción real, database.py es configurado por el instalador/usuario

      - name: Compilar backend con PyInstaller
        run: |
          pyinstaller `
            --name app `
            --onefile `
            --noconsole `
            --distpath backend/dist `
            --add-data "proyecto/dist;proyecto/dist" `
            backend/app.py
        shell: pwsh
        # Genera: backend/dist/app.exe

      # ── 4. Build Electron (electron-builder) ──────────────────────────────
      - name: Instalar dependencias Electron
        working-directory: electron
        run: npm ci

      - name: Copiar backend compilado a resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "electron/resources/backend"
          Copy-Item "backend/dist/app.exe" "electron/resources/backend/app.exe"

      - name: Build instalador Electron
        working-directory: electron
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Genera: electron/release/*.exe + *.blockmap

      # ── 5. Crear GitHub Release ────────────────────────────────────────────
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', inputs.version) }}
          name: "Software Residencias ITCM v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🚀 Release v${{ steps.version.outputs.VERSION }}

            ### Instalación
            1. Descarga el archivo `.exe` de abajo
            2. Ejecuta el instalador
            3. Configura la conexión a tu base de datos MySQL al primer arranque

            ### Requisitos del sistema
            - Windows 10 / 11 (64-bit)
            - MySQL 8.0+ (servidor local o en red)

            ---
            *Generado automáticamente por GitHub Actions*
          draft: true          # Queda como draft para revisión manual antes de publicar
          prerelease: false
          files: |
            electron/release/*.exe
            electron/release/*.blockmap
            electron/release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
